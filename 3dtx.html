<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Three.js - 3D Model Loader</title>
    <style>
        * {
            margin: 0;
            padding: 0;
        }
        body {
            overflow: hidden;
            background: #1a1a1a;
            font-family: Arial, sans-serif;
        }
        canvas {
            display: block;
        }

        /* Loading overlay */
        #loading {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #1a1a1a;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            transition: opacity 0.8s ease;
        }
        #loading.hidden {
            opacity: 0;
            pointer-events: none;
        }
        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid #333;
            border-top-color: #00aaff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        #progress-text {
            color: #fff;
            margin-top: 20px;
            font-size: 16px;
            letter-spacing: 1px;
        }
        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* Info */
        #info {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.5);
            font-size: 13px;
            font-family: Arial, sans-serif;
            text-align: center;
            pointer-events: none;
            background: rgba(0, 0, 0, 0.6);
            padding: 8px 16px;
            border-radius: 20px;
            backdrop-filter: blur(4px);
        }
    </style>
</head>
<body>

    <!-- Loading Screen -->
    <div id="loading">
        <div class="spinner"></div>
        <div id="progress-text">Loading 3D Model... 0%</div>
    </div>

    <!-- Info -->
    <div id="info">🖱️ Drag to rotate · Scroll to zoom</div>

    <!-- Import maps + Three.js -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        // ----- IMPORTS -----
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // ----- DOM REFS -----
        const loadingEl = document.getElementById('loading');
        const progressText = document.getElementById('progress-text');

        // ----- SCENE SETUP -----
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x1a1a1a);

        // Camera
        const camera = new THREE.PerspectiveCamera(
            45,
            window.innerWidth / window.innerHeight,
            0.1,
            1000
        );
        camera.position.set(5, 4, 8);
        camera.lookAt(0, 0, 0);

        // Renderer
        const renderer = new THREE.WebGLRenderer({
            antialias: true,
            alpha: false,
        });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.2;
        document.body.appendChild(renderer.domElement);

        // Controls
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.08;
        controls.minDistance = 2;
        controls.maxDistance = 30;
        controls.target.set(0, 0.5, 0);
        controls.update();

        // ----- LIGHTS -----
        // Ambient
        const ambientLight = new THREE.AmbientLight(0x404060, 0.5);
        scene.add(ambientLight);

        // Main directional light
        const mainLight = new THREE.DirectionalLight(0xffffff, 1.5);
        mainLight.position.set(10, 15, 10);
        mainLight.castShadow = true;
        mainLight.shadow.mapSize.width = 2048;
        mainLight.shadow.mapSize.height = 2048;
        scene.add(mainLight);

        // Fill light
        const fillLight = new THREE.DirectionalLight(0x4488ff, 0.5);
        fillLight.position.set(-10, 5, -10);
        scene.add(fillLight);

        // Rim light
        const rimLight = new THREE.DirectionalLight(0xff8844, 0.4);
        rimLight.position.set(0, -5, 10);
        scene.add(rimLight);

        // Hemisphere
        const hemiLight = new THREE.HemisphereLight(0x8888ff, 0x444422, 0.6);
        scene.add(hemiLight);

        // ----- GROUND (optional helper grid) -----
        const gridHelper = new THREE.GridHelper(10, 20, 0x444466, 0x333355);
        gridHelper.position.y = -0.5;
        scene.add(gridHelper);

        // ----- LOADER -----
        const loader = new GLTFLoader();

        // Load a public 3D model (NASA's Curiosity Rover as an example)
        // You can replace this URL with your own model
        const MODEL_URL =
            '3dtx.glb';

        loader.load(
            MODEL_URL,

            // Success
            (gltf) => {
                const model = gltf.scene;

                // Scale and position the model
                model.scale.set(2, 2, 2);
                model.position.y = 0;

                // Enable shadows on all children
                model.traverse((child) => {
                    if (child.isMesh) {
                        child.castShadow = true;
                        child.receiveShadow = true;

                        // Optional: add a slight emissive glow to materials
                        if (child.material) {
                            child.material.envMapIntensity = 1.0;
                        }
                    }
                });

                scene.add(model);

                // Hide loading screen
                loadingEl.classList.add('hidden');
                progressText.textContent = 'Done! ✓';
            },

            // Progress
            (xhr) => {
                const percent = Math.round((xhr.loaded / xhr.total) * 100);
                progressText.textContent = `Loading 3D Model... ${percent}%`;
            },

            // Error
            (error) => {
                console.error('Error loading model:', error);
                progressText.textContent = '❌ Failed to load model';
                progressText.style.color = '#ff6666';

                // Show a fallback: a simple geometric shape
                showFallback();
            }
        );

        // ----- FALLBACK: if model fails to load -----
        function showFallback() {
            const geometry = new THREE.TorusKnotGeometry(1, 0.3, 100, 16);
            const material = new THREE.MeshPhysicalMaterial({
                color: 0x00aaff,
                metalness: 0.7,
                roughness: 0.2,
                emissive: 0x004466,
                emissiveIntensity: 0.3,
                clearcoat: 0.8,
            });
            const mesh = new THREE.Mesh(geometry, material);
            mesh.castShadow = true;
            mesh.receiveShadow = true;
            scene.add(mesh);

            // Animate the fallback
            const fallbackAnim = () => {
                mesh.rotation.x += 0.005;
                mesh.rotation.y += 0.01;
                requestAnimationFrame(fallbackAnim);
            };
            fallbackAnim();

            setTimeout(() => {
                loadingEl.classList.add('hidden');
            }, 500);
        }

        // ----- RESIZE HANDLER -----
        window.addEventListener('resize', () => {
            const w = window.innerWidth;
            const h = window.innerHeight;
            camera.aspect = w / h;
            camera.updateProjectionMatrix();
            renderer.setSize(w, h);
        });

        // ----- ANIMATION LOOP -----
        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }
        animate();

        // Log success
        console.log('🚀 Three.js app ready!');
    </script>
</body>
</html>
